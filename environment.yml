name: grounding_dino
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  - pip>=23.0

  # PyTorch ecosystem
  # Your server has CUDA 13.0 driver, so you can use CUDA 12.1/12.4 PyTorch builds
  - pytorch=2.4.0
  - torchvision=0.19.0
  - torchaudio=2.4.0
  - pytorch-cuda=12.1

  # Scientific computing & image processing
  - numpy
  - scipy
  - pillow
  - opencv
  - matplotlib

  # HuggingFace (text backbone BERT + tokenizer)
  - transformers=4.35.2
  - tokenizers=0.15.2

  # Vision models (Swin Transformer backbones)
  - timm>=0.9.12

  # COCO / LVIS evaluation
  - pycocotools

  # Utilities
  - tqdm
  - pyyaml
  - jupyter

  # pip-only extras
  - pip:
    - supervision>=0.18.0
    - einops

    # Development
    - pytest
    - black
    - flake8
