name: grounding_dino
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  - pip>=23.0

  # PyTorch ecosystem
  # Your server has CUDA 13.0 driver, so you can use CUDA 12.1/12.4 PyTorch builds
  # TITAN V has 12GB VRAM — see hardware_notes.md for training tips
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - torchaudio>=2.0.0
  - pytorch-cuda=12.4

  # Scientific computing & image processing
  - numpy
  - scipy
  - pillow
  - opencv
  - matplotlib
  - scikit-image

  # Utilities
  - tqdm
  - pyyaml
  - tensorboard
  - jupyter

  # Install remaining packages via pip
  - pip:
    # HuggingFace (text backbone BERT + tokenizer)
    - transformers>=4.30.0
    - tokenizers

    # Vision models (Swin Transformer backbones)
    - timm>=0.9.0

    # COCO / LVIS evaluation
    - pycocotools
    # NOTE: lvis-api can be tricky on Windows; see README for workaround

    # Optional but highly recommended for DETR-style models
    - einops

    # Visualization helpers (from original GroundingDINO repo ecosystem)
    - supervision

    # Experiment tracking (optional)
    # - wandb

    # Development
    - pytest
    - black
    - flake8
